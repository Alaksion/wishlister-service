openapi: 3.0.3
info:
  title: Wishlister API
  description: API for managing wishlists, users, and authentication.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Health
    description: Service health checks
  - name: Auth
    description: Authentication and session management
  - name: Users
    description: User account management
  - name: Items
    description: Wishlist item management

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserInput'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUser'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Log in
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      operationId: refreshTokens
      security:
        - RefreshTokenAuth: []
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Log out
      operationId: logoutUser
      security:
        - RefreshTokenAuth: []
      responses:
        '204':
          description: Logged out successfully
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/logout-all:
    post:
      tags:
        - Auth
      summary: Log out all sessions
      operationId: logoutAllSessions
      security:
        - RefreshTokenAuth: []
      responses:
        '204':
          description: All other sessions revoked
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/me:
    delete:
      tags:
        - Users
      summary: Deactivate the authenticated user
      operationId: deactivateUser
      security:
        - BearerAuth: []
      responses:
        '204':
          description: User deactivated
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /items:
    get:
      tags:
        - Items
      summary: List wishlist items
      operationId: listWishlistItems
      security:
        - BearerAuth: []
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of items to return
        - name: search
          in: query
          schema:
            type: string
          description: Text search on title and description
        - name: priority
          in: query
          schema:
            type: string
            enum:
              - low
              - medium
              - high
          description: Filter by priority
        - name: isPurchased
          in: query
          schema:
            type: boolean
          description: Filter by purchase status
        - name: sortBy
          in: query
          schema:
            type: string
            enum:
              - createdAt
              - price
              - priority
            default: createdAt
          description: Field to sort by
        - name: sortDirection
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
          description: Sort direction
      responses:
        '200':
          description: Paginated list of items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListWishlistItemsResult'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      tags:
        - Items
      summary: Create a wishlist item
      operationId: createWishlistItem
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateWishlistItemRequest'
            encoding:
              images:
                contentType: image/jpeg, image/png, image/webp
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WishlistItem'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /items/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
        description: Wishlist item ID

    get:
      tags:
        - Items
      summary: Get a wishlist item
      operationId: getWishlistItem
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Item details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WishlistItem'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    patch:
      tags:
        - Items
      summary: Update a wishlist item
      operationId: updateWishlistItem
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWishlistItemInput'
      responses:
        '200':
          description: Updated item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WishlistItem'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    delete:
      tags:
        - Items
      summary: Delete a wishlist item
      operationId: deleteWishlistItem
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Item deleted
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /auth/login or /auth/refresh
    RefreshTokenAuth:
      type: apiKey
      in: header
      name: x-refresh-token
      description: Refresh token obtained from /auth/login or /auth/refresh

  schemas:
    HealthStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    RegisterUserInput:
      type: object
      required:
        - email
        - displayName
        - password
      properties:
        email:
          type: string
          format: email
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        password:
          type: string
          minLength: 8

    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    PublicUser:
      type: object
      required:
        - id
        - email
        - displayName
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string

    AuthTokens:
      type: object
      required:
        - accessToken
        - refreshToken
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    Image:
      type: object
      required:
        - s3Key
        - url
        - uploadedAt
      properties:
        s3Key:
          type: string
        url:
          type: string
          format: uri
        originalName:
          type: string
        uploadedAt:
          type: string
          format: date-time

    WishlistItem:
      type: object
      required:
        - id
        - userId
        - title
        - currency
        - priority
        - isPurchased
        - images
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        userId:
          type: string
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        url:
          type: string
          format: uri
        price:
          type: integer
          minimum: 0
        currency:
          type: string
          minLength: 3
          maxLength: 3
          default: USD
        priority:
          type: string
          enum:
            - low
            - medium
            - high
        isPurchased:
          type: boolean
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ListWishlistItemsResult:
      type: object
      required:
        - items
        - nextCursor
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WishlistItem'
        nextCursor:
          type: string
          nullable: true

    CreateWishlistItemRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        url:
          type: string
          format: uri
        price:
          type: integer
          minimum: 0
        currency:
          type: string
          minLength: 3
          maxLength: 3
          default: USD
        priority:
          type: string
          enum:
            - low
            - medium
            - high
          default: medium
        images:
          type: array
          maxItems: 3
          items:
            type: string
            format: binary

    UpdateWishlistItemInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        url:
          type: string
          format: uri
        price:
          type: integer
          minimum: 0
        currency:
          type: string
          minLength: 3
          maxLength: 3
        priority:
          type: string
          enum:
            - low
            - medium
            - high
        isPurchased:
          type: boolean

    ValidationIssue:
      type: object
      required:
        - path
        - message
      properties:
        path:
          type: string
        message:
          type: string

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - message
          properties:
            message:
              type: string
            details:
              type: array
              items:
                $ref: '#/components/schemas/ValidationIssue'

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    ConflictError:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
